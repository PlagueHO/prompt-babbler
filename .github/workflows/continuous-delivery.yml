name: Continuous Delivery

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths:
      - infra/**
      - prompt-babbler-service/**
      - prompt-babbler-app/**

  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  checks: write
  pull-requests: write
  packages: write

jobs:
  set-build-variables:
    name: Set Build Variables
    uses: ./.github/workflows/set-build-variables.yml

  lint-and-publish-bicep:
    name: Lint and Publish Bicep
    uses: ./.github/workflows/lint-and-publish-bicep.yml

  lint-build-test-and-publish-backend-service:
    name: Lint, Build, Test and Publish Backend Service
    uses: ./.github/workflows/build-and-publish-backend-service.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write
    with:
      build_configuration: 'Release'

  build-and-publish-frontend-app:
    name: Build and Publish Frontend App
    uses: ./.github/workflows/build-and-publish-frontend-app.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write

  build-and-push-api-container:
    name: Build and Push API Container Image
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - set-build-variables
      - lint-build-test-and-publish-backend-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=${TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API container image
        uses: docker/build-push-action@v6
        with:
          context: ./prompt-babbler-service
          file: ./prompt-babbler-service/src/Api/Dockerfile
          push: true
          tags: |
            ghcr.io/plagueho/prompt-babbler-api:latest
            ghcr.io/plagueho/prompt-babbler-api:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/PlagueHO/prompt-babbler
            org.opencontainers.image.description=Prompt Babbler API Service
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

  validate-infrastructure:
    name: Validate Infrastructure
    needs:
      - set-build-variables
      - lint-and-publish-bicep
      - lint-build-test-and-publish-backend-service
    uses: ./.github/workflows/validate-infrastructure.yml
    with:
      ENVIRONMENT: test
      BUILD_VERSION: ${{ needs.set-build-variables.outputs.BUILD_VERSION }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus2' }}
      AZURE_ENV_NAME: ${{ format('pbblr-{0}', github.run_id) }}
    secrets:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

  e2e-test:
    name: E2E Test
    needs:
      - set-build-variables
      - validate-infrastructure
    uses: ./.github/workflows/e2e-test.yml
    with:
      ENVIRONMENT: test
      BUILD_VERSION: ${{ needs.set-build-variables.outputs.BUILD_VERSION }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus2' }}
      AZURE_ENV_NAME: ${{ format('pbblr-{0}', github.run_id) }}
    secrets:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
