name: Continuous Delivery

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths:
      - .github/workflows/**
      - infra/**
      - prompt-babbler-service/**
      - prompt-babbler-app/**

  workflow_dispatch:

permissions:
  contents: read

jobs:
  set-build-variables:
    name: Set Build Variables
    uses: ./.github/workflows/set-build-variables.yml

  lint-and-publish-bicep:
    name: Lint and Publish Bicep
    uses: ./.github/workflows/lint-and-publish-bicep.yml

  build-backend-service:
    name: Build Backend Service
    uses: ./.github/workflows/build-backend-service.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write
    with:
      build_configuration: 'Release'

  build-frontend-app:
    name: Build Frontend App
    uses: ./.github/workflows/build-frontend-app.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write

  publish-backend-service:
    name: Publish Backend Service
    needs:
      - set-build-variables
      - build-backend-service
    uses: ./.github/workflows/publish-backend-service.yml
    permissions:
      contents: read
      packages: write

  e2e-test:
    name: E2E Test
    needs:
      - set-build-variables
      - lint-and-publish-bicep
      - build-backend-service
      - publish-backend-service
    uses: ./.github/workflows/e2e-test.yml
    permissions:
      id-token: write
      contents: read
      checks: write
    with:
      ENVIRONMENT: test
      BUILD_VERSION: ${{ needs.set-build-variables.outputs.BUILD_VERSION }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus2' }}
      AZURE_ENV_NAME: ${{ format('pbblr-{0}', github.run_id) }}
      CONTAINER_IMAGE_API: ${{ needs.publish-backend-service.outputs['api-container-image'] }}
      CONTAINER_IMAGE_MCP_SERVER: ${{ needs.publish-backend-service.outputs['mcp-server-container-image'] }}
    secrets:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

  # ────────────────────────────────────────────────────────────────────────────
  # Production deployment — only runs on v* tag pushes, after E2E tests pass.
  # Delegates to deploy-production.yml for validate, provision, deploy & smoke.
  # ────────────────────────────────────────────────────────────────────────────

  deploy-production:
    name: Deploy Production
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - set-build-variables
      - e2e-test
      - publish-backend-service
    uses: ./.github/workflows/deploy-production.yml
    permissions:
      id-token: write
      contents: read
      checks: write
    with:
      BUILD_VERSION: ${{ needs.set-build-variables.outputs.BUILD_VERSION }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus2' }}
      CONTAINER_IMAGE_API: ${{ needs.publish-backend-service.outputs['api-container-image'] }}
      CONTAINER_IMAGE_MCP_SERVER: ${{ needs.publish-backend-service.outputs['mcp-server-container-image'] }}
    secrets:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ACCESS_CODE: ${{ secrets.ACCESS_CODE }}
      AZURE_STATIC_WEB_APP_CUSTOM_DOMAIN: ${{ secrets.AZURE_STATIC_WEB_APP_CUSTOM_DOMAIN }}
