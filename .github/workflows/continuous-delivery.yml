name: Continuous Delivery

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths:
      - infra/**
      - prompt-babbler-service/**
      - prompt-babbler-app/**

  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  checks: write
  pull-requests: write
  packages: write

jobs:
  set-build-variables:
    name: Set Build Variables
    uses: ./.github/workflows/set-build-variables.yml

  lint-and-publish-bicep:
    name: Lint and Publish Bicep
    uses: ./.github/workflows/lint-and-publish-bicep.yml

  lint-build-test-and-publish-backend-service:
    name: Lint, Build, Test and Publish Backend Service
    uses: ./.github/workflows/build-and-publish-backend-service.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write
    with:
      build_configuration: 'Release'

  build-and-publish-frontend-app:
    name: Build and Publish Frontend App
    uses: ./.github/workflows/build-and-publish-frontend-app.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write

  build-and-push-api-container:
    name: Build and Push API Container Image
    needs:
      - set-build-variables
      - lint-build-test-and-publish-backend-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract container metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/prompt-babbler-api
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=sha-${{ github.sha }}
            type=ref,event=tag

      - name: Build and push API container image
        uses: docker/build-push-action@v7
        with:
          context: ./prompt-babbler-service
          file: ./prompt-babbler-service/src/Api/Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Prompt Babbler API Service
            org.opencontainers.image.version=${{ github.sha }}

  build-and-push-mcp-server-container:
    name: Build and Push MCP Server Container Image
    needs:
      - set-build-variables
      - lint-build-test-and-publish-backend-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract container metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/prompt-babbler-mcp-server
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=sha-${{ github.sha }}
            type=ref,event=tag

      - name: Build and push MCP server container image
        uses: docker/build-push-action@v7
        with:
          context: ./prompt-babbler-service
          file: ./prompt-babbler-service/src/McpServer/Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Prompt Babbler MCP Server
            org.opencontainers.image.version=${{ github.sha }}

  e2e-test:
    name: E2E Test
    needs:
      - set-build-variables
      - lint-and-publish-bicep
      - lint-build-test-and-publish-backend-service
      - build-and-push-api-container
      - build-and-push-mcp-server-container
    uses: ./.github/workflows/e2e-test.yml
    with:
      ENVIRONMENT: test
      BUILD_VERSION: ${{ needs.set-build-variables.outputs.BUILD_VERSION }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus2' }}
      AZURE_ENV_NAME: ${{ format('pbblr-{0}', github.run_id) }}
      CONTAINER_IMAGE_API: ghcr.io/${{ github.repository_owner }}/prompt-babbler-api:sha-${{ github.sha }}
      CONTAINER_IMAGE_MCP_SERVER: ghcr.io/${{ github.repository_owner }}/prompt-babbler-mcp-server:sha-${{ github.sha }}
    secrets:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

  # ────────────────────────────────────────────────────────────────────────────
  # Production deployment — only runs on v* tag pushes, after E2E tests pass.
  # Delegates to deploy-production.yml for validate, provision, deploy & smoke.
  # ────────────────────────────────────────────────────────────────────────────

  deploy-production:
    name: Deploy Production
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - set-build-variables
      - e2e-test
      - build-and-push-api-container
      - build-and-push-mcp-server-container
    uses: ./.github/workflows/deploy-production.yml
    permissions:
      id-token: write
      contents: read
      checks: write
    with:
      BUILD_VERSION: ${{ needs.set-build-variables.outputs.BUILD_VERSION }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus2' }}
      CONTAINER_IMAGE_API: ghcr.io/${{ github.repository_owner }}/prompt-babbler-api:${{ github.ref_name }}
      CONTAINER_IMAGE_MCP_SERVER: ghcr.io/${{ github.repository_owner }}/prompt-babbler-mcp-server:${{ github.ref_name }}
    secrets:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ACCESS_CODE: ${{ secrets.ACCESS_CODE }}
