name: Validate Infrastructure

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        description: "The environment to validate the application infrastructure for"
        required: true
        type: string
      BUILD_VERSION:
        description: "The version of the build to deploy to the application resources"
        required: true
        type: string
      AZURE_LOCATION:
        description: "The Azure region to deploy the application resources to"
        required: true
        type: string
      AZURE_ENV_NAME:
        description: "The name of the Azure environment"
        required: true
        type: string
      CONTAINER_IMAGE_API:
        description: "API container image to deploy (e.g., ghcr.io/owner/prompt-babbler-api:v1.0.0). Defaults to :latest."
        required: false
        type: string
        default: ''
      CONTAINER_IMAGE_MCP_SERVER:
        description: "MCP server container image to deploy (e.g., ghcr.io/owner/prompt-babbler-mcp-server:v1.0.0). Defaults to :latest."
        required: false
        type: string
        default: ''

    secrets:
      AZURE_TENANT_ID:
        description: "The Azure tenant ID to use for authentication to Azure for deployment"
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: "The Azure subscription ID to use for authentication to Azure for deployment"
        required: true
      AZURE_CLIENT_ID:
        description: "The Azure client ID to use for authentication to Azure for deployment"
        required: true

jobs:
  validate-infrastructure:
    name: Validate Infrastructure ${{ inputs.ENVIRONMENT }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.ENVIRONMENT }}
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME || inputs.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION || inputs.AZURE_LOCATION }}
      AZURE_PRINCIPAL_ID_TYPE: 'ServicePrincipal'
      AZURE_CONTAINER_APP_API_IMAGE: ${{ inputs.CONTAINER_IMAGE_API }}
      AZURE_CONTAINER_APP_MCP_SERVER_IMAGE: ${{ inputs.CONTAINER_IMAGE_MCP_SERVER }}

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v8

      - name: Azure Login
        uses: azure/login@v3
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Validate
        id: validate-azure-infrastructure
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: whatIf
          name: ${{ inputs.AZURE_ENV_NAME }}-${{inputs.AZURE_LOCATION}}-${{ inputs.ENVIRONMENT }}-${{ github.action_ref }}-${{ github.run_number }}
          scope: subscription
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          location: ${{ inputs.AZURE_LOCATION }}
          template-file: ./infrastructure_bicep/main.bicep
          parameters-file: ./infrastructure_bicep/main.bicepparam
