name: Continuous Integration

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/**
      - infra/**
      - prompt-babbler-service/**
      - prompt-babbler-app/**
      - docs/**
      - '*.md'
  push:
    branches:
      - main
    paths:
      - .github/workflows/**
      - infra/**
      - prompt-babbler-service/**
      - prompt-babbler-app/**
      - docs/**
      - '*.md'

  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint-markdown:
    name: Lint Markdown
    uses: ./.github/workflows/lint-markdown.yml

  lint-and-publish-bicep:
    name: Lint and Publish Bicep
    uses: ./.github/workflows/lint-and-publish-bicep.yml
    permissions:
      contents: read

  build-backend-service:
    name: Build Backend Service
    uses: ./.github/workflows/build-backend-service.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write

  build-frontend-app:
    name: Build Frontend App
    uses: ./.github/workflows/build-frontend-app.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write

  build-docs:
    name: Build Docs
    uses: ./.github/workflows/build-docs.yml
    permissions:
      contents: read
