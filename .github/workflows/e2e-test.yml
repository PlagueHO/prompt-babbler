name: End-to-End Test

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        description: "The environment to use for E2E testing"
        required: true
        type: string
      BUILD_VERSION:
        description: "The version of the build to deploy to the application resources"
        required: true
        type: string
      AZURE_LOCATION:
        description: "The Azure region to deploy the application resources to"
        required: true
        type: string
      AZURE_ENV_NAME:
        description: "The name of the Azure environment"
        required: true
        type: string

    secrets:
      AZURE_TENANT_ID:
        description: "The Azure tenant ID to use for authentication to Azure for deployment"
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: "The Azure subscription ID to use for authentication to Azure for deployment"
        required: true
      AZURE_CLIENT_ID:
        description: "The Azure client ID to use for authentication to Azure for deployment"
        required: true

jobs:
  provision-infrastructure:
    name: Provision Infrastructure
    # E2E tests provision without Entra ID (ENABLE_ENTRA_AUTH is NOT set).
    # This avoids requiring Application.ReadWrite.All Graph permission for ephemeral
    # test environments. The app runs in anonymous single-user mode.
    # TODO: Add headless auth E2E tests when ROPC/client-credential flow is implemented.
    uses: ./.github/workflows/provision-infrastructure.yml
    with:
      ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
      BUILD_VERSION: ${{ inputs.BUILD_VERSION }}
      AZURE_LOCATION: ${{ inputs.AZURE_LOCATION }}
      AZURE_ENV_NAME: ${{ inputs.AZURE_ENV_NAME }}
    secrets:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

  # TODO: Add integration/E2E test jobs here when the application
  # has been redesigned for Azure hosting (vNext). Example:
  #
  # api-integration-tests:
  #   name: Run API Integration Tests
  #   needs: [provision-infrastructure]
  #   runs-on: ubuntu-latest
  #   environment: ${{ inputs.ENVIRONMENT }}
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v6
  #     - name: Run integration tests against provisioned infrastructure
  #       run: |
  #         echo "Running integration tests against:"
  #         echo "  API: https://${{ needs.provision-infrastructure.outputs.AZURE_CONTAINER_APP_FQDN }}"
  #         echo "  Frontend: https://${{ needs.provision-infrastructure.outputs.AZURE_STATIC_WEB_APP_DEFAULT_HOSTNAME }}"

  delete-infrastructure:
    name: Delete Provisioned Infrastructure
    needs: [provision-infrastructure]
    if: always()
    uses: ./.github/workflows/delete-infrastructure.yml
    with:
      ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
      AZURE_LOCATION: ${{ inputs.AZURE_LOCATION }}
      AZURE_ENV_NAME: ${{ inputs.AZURE_ENV_NAME }}
    secrets:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
