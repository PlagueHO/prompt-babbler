name: Publish Backend Service

on:
  workflow_call:
    outputs:
      api-container-image:
        description: 'Published API container image reference'
        value: ${{ jobs.publish-backend-service.outputs.api-container-image }}
      mcp-server-container-image:
        description: 'Published MCP Server container image reference'
        value: ${{ jobs.publish-backend-service.outputs.mcp-server-container-image }}

permissions:
  contents: read
  packages: write

jobs:
  publish-backend-service:
    name: Publish Backend Service
    runs-on: ubuntu-latest
    outputs:
      api-container-image: ${{ steps.image-outputs.outputs.api-container-image }}
      mcp-server-container-image: ${{ steps.image-outputs.outputs.mcp-server-container-image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract API container metadata
        id: api-metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/prompt-babbler-api
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=sha-${{ github.sha }}
            type=ref,event=tag

      - name: Build and push API container image
        uses: docker/build-push-action@v7
        with:
          context: ./prompt-babbler-service
          file: ./prompt-babbler-service/src/Api/Dockerfile
          push: true
          tags: ${{ steps.api-metadata.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Prompt Babbler API Service
            org.opencontainers.image.version=${{ github.sha }}

      - name: Extract MCP Server container metadata
        id: mcp-server-metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/prompt-babbler-mcp-server
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=sha-${{ github.sha }}
            type=ref,event=tag

      - name: Build and push MCP Server container image
        uses: docker/build-push-action@v7
        with:
          context: ./prompt-babbler-service
          file: ./prompt-babbler-service/src/McpServer/Dockerfile
          push: true
          tags: ${{ steps.mcp-server-metadata.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Prompt Babbler MCP Server
            org.opencontainers.image.version=${{ github.sha }}

      - name: Set published image outputs
        id: image-outputs
        shell: bash
        run: |
          api_image="ghcr.io/${{ github.repository_owner }}/prompt-babbler-api:sha-${{ github.sha }}"
          mcp_image="ghcr.io/${{ github.repository_owner }}/prompt-babbler-mcp-server:sha-${{ github.sha }}"

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            api_image="ghcr.io/${{ github.repository_owner }}/prompt-babbler-api:${{ github.ref_name }}"
            mcp_image="ghcr.io/${{ github.repository_owner }}/prompt-babbler-mcp-server:${{ github.ref_name }}"
          fi

          echo "api-container-image=${api_image}" >> "$GITHUB_OUTPUT"
          echo "mcp-server-container-image=${mcp_image}" >> "$GITHUB_OUTPUT"
