name: Smoke Test

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        description: "The environment to use for the smoke test"
        required: true
        type: string
      AZURE_CONTAINER_APP_FQDN:
        description: "The FQDN of the deployed Azure Container App"
        required: true
        type: string
      AZURE_STATIC_WEB_APP_DEFAULT_HOSTNAME:
        description: "The default hostname of the deployed Azure Static Web App"
        required: true
        type: string
      AZURE_RESOURCE_GROUP:
        description: "The Azure resource group containing the Container App"
        required: true
        type: string
      AZURE_CONTAINER_APP_NAME:
        description: "The name of the Azure Container App (API)"
        required: true
        type: string
      AZURE_MCP_SERVER_CONTAINER_APP_NAME:
        description: "The name of the Azure Container App (MCP Server)"
        required: true
        type: string
      AZURE_MCP_SERVER_CONTAINER_APP_FQDN:
        description: "The FQDN of the deployed Azure Container App (MCP Server)"
        required: true
        type: string

    secrets:
      AZURE_TENANT_ID:
        description: "The Azure tenant ID for authentication"
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: "The Azure subscription ID for authentication"
        required: true
      AZURE_CLIENT_ID:
        description: "The Azure client ID for authentication"
        required: true
      ACCESS_CODE:
        description: "Optional access code for secured API endpoints (if configured)"
        required: false

jobs:
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    environment: ${{ inputs.ENVIRONMENT }}
    permissions:
      checks: write
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate Azure CLI (Federated Credentials)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check Container App Status
        shell: pwsh
        run: |
          Write-Host "=== Container App Provisioning State ==="
          $app = az containerapp show `
            --name '${{ inputs.AZURE_CONTAINER_APP_NAME }}' `
            --resource-group '${{ inputs.AZURE_RESOURCE_GROUP }}' `
            --output json | ConvertFrom-Json

          Write-Host "Provisioning State: $($app.properties.provisioningState)"
          Write-Host "Running State: $($app.properties.runningStatus.state)"
          Write-Host "Latest Revision: $($app.properties.latestRevisionName)"
          Write-Host "Latest Revision FQDN: $($app.properties.latestRevisionFqdn)"
          Write-Host "FQDN: $($app.properties.configuration.ingress.fqdn)"

          Write-Host ""
          Write-Host "=== Active Revisions ==="
          $revisions = az containerapp revision list `
            --name '${{ inputs.AZURE_CONTAINER_APP_NAME }}' `
            --resource-group '${{ inputs.AZURE_RESOURCE_GROUP }}' `
            --output json | ConvertFrom-Json

          foreach ($rev in $revisions) {
            Write-Host "Revision: $($rev.name)"
            Write-Host "  Active: $($rev.properties.active)"
            Write-Host "  Running State: $($rev.properties.runningState)"
            Write-Host "  Provisioning State: $($rev.properties.provisioningState)"
            Write-Host "  Health State: $($rev.properties.healthState)"
            Write-Host "  Replicas: $($rev.properties.replicas)"
            Write-Host "  Created: $($rev.properties.createdTime)"
          }

          Write-Host ""
          Write-Host "=== Recent Container App Logs (last 50 lines) ==="
          az containerapp logs show `
            --name '${{ inputs.AZURE_CONTAINER_APP_NAME }}' `
            --resource-group '${{ inputs.AZURE_RESOURCE_GROUP }}' `
            --type system `
            --tail 50 2>&1 | Write-Host

      - name: Check MCP Server Container App Status
        shell: pwsh
        run: |
          Write-Host "=== MCP Server Container App Provisioning State ==="
          $app = az containerapp show `
            --name '${{ inputs.AZURE_MCP_SERVER_CONTAINER_APP_NAME }}' `
            --resource-group '${{ inputs.AZURE_RESOURCE_GROUP }}' `
            --output json | ConvertFrom-Json

          Write-Host "Provisioning State: $($app.properties.provisioningState)"
          Write-Host "Running State: $($app.properties.runningStatus.state)"
          Write-Host "Latest Revision: $($app.properties.latestRevisionName)"
          Write-Host "Latest Revision FQDN: $($app.properties.latestRevisionFqdn)"
          Write-Host "FQDN: $($app.properties.configuration.ingress.fqdn)"

          Write-Host ""
          Write-Host "=== Active Revisions ==="
          $revisions = az containerapp revision list `
            --name '${{ inputs.AZURE_MCP_SERVER_CONTAINER_APP_NAME }}' `
            --resource-group '${{ inputs.AZURE_RESOURCE_GROUP }}' `
            --output json | ConvertFrom-Json

          foreach ($rev in $revisions) {
            Write-Host "Revision: $($rev.name)"
            Write-Host "  Active: $($rev.properties.active)"
            Write-Host "  Running State: $($rev.properties.runningState)"
            Write-Host "  Provisioning State: $($rev.properties.provisioningState)"
            Write-Host "  Health State: $($rev.properties.healthState)"
            Write-Host "  Replicas: $($rev.properties.replicas)"
            Write-Host "  Created: $($rev.properties.createdTime)"
          }

          Write-Host ""
          Write-Host "=== Recent MCP Server Container App Logs (last 50 lines) ==="
          az containerapp logs show `
            --name '${{ inputs.AZURE_MCP_SERVER_CONTAINER_APP_NAME }}' `
            --resource-group '${{ inputs.AZURE_RESOURCE_GROUP }}' `
            --type system `
            --tail 50 2>&1 | Write-Host

      - name: Install Pester
        shell: pwsh
        run: Install-Module -Name Pester -MinimumVersion 5.5.0 -Force -Scope CurrentUser

      - name: Run Smoke Tests
        shell: pwsh
        run: |
          $container = New-PesterContainer -Path 'tests/smoke/Smoke.Tests.ps1' -Data @{
            ApiBaseUrl         = 'https://${{ inputs.AZURE_CONTAINER_APP_FQDN }}'
            McpServerBaseUrl   = 'https://${{ inputs.AZURE_MCP_SERVER_CONTAINER_APP_FQDN }}'
            FrontendBaseUrl    = 'https://${{ inputs.AZURE_STATIC_WEB_APP_DEFAULT_HOSTNAME }}'
            AccessCode         = '${{ secrets.ACCESS_CODE }}'
          }

          $config = New-PesterConfiguration
          $config.Run.Container = $container
          $config.Run.PassThru = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'TestResults/smoke-tests.xml'
          $config.TestResult.OutputFormat = 'NUnitXml'

          $result = Invoke-Pester -Configuration $config

          if ($result.FailedCount -gt 0) {
            exit 1
          }

      - name: Publish Smoke Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          check_name: Smoke Test Results
          comment_title: Smoke Test Results
          files: |
            TestResults/smoke-tests.xml

      - name: Diagnose Container App on Failure
        if: failure()
        shell: pwsh
        run: |
          Write-Host "=== Container App Detailed Diagnostics ==="

          Write-Host ""
          Write-Host "--- Revision Details ---"
          $revisions = az containerapp revision list `
            --name '${{ inputs.AZURE_CONTAINER_APP_NAME }}' `
            --resource-group '${{ inputs.AZURE_RESOURCE_GROUP }}' `
            --output json | ConvertFrom-Json

          foreach ($rev in $revisions) {
            Write-Host "Revision: $($rev.name) | Active: $($rev.properties.active) | Running: $($rev.properties.runningState) | Health: $($rev.properties.healthState) | Replicas: $($rev.properties.replicas)"

            # Show replica details
            $replicas = az containerapp replica list `
              --name '${{ inputs.AZURE_CONTAINER_APP_NAME }}' `
              --resource-group '${{ inputs.AZURE_RESOURCE_GROUP }}' `
              --revision "$($rev.name)" `
              --output json 2>&1 | ConvertFrom-Json -ErrorAction SilentlyContinue

            if ($replicas) {
              foreach ($replica in $replicas) {
                Write-Host "  Replica: $($replica.name)"
                foreach ($container in $replica.properties.containers) {
                  Write-Host "    Container: $($container.name) | State: $($container.runningState) | ExitCode: $($container.exitCode) | RestartCount: $($container.restartCount)"
                  if ($container.runningStateDetail) {
                    Write-Host "    State Detail: $($container.runningStateDetail)"
                  }
                }
              }
            }
          }

          Write-Host ""
          Write-Host "--- System Logs (last 100 lines) ---"
          az containerapp logs show `
            --name '${{ inputs.AZURE_CONTAINER_APP_NAME }}' `
            --resource-group '${{ inputs.AZURE_RESOURCE_GROUP }}' `
            --type system `
            --tail 100 2>&1 | Write-Host

          Write-Host ""
          Write-Host "--- Console Logs (last 100 lines) ---"
          az containerapp logs show `
            --name '${{ inputs.AZURE_CONTAINER_APP_NAME }}' `
            --resource-group '${{ inputs.AZURE_RESOURCE_GROUP }}' `
            --type console `
            --tail 100 2>&1 | Write-Host

      - name: Diagnose MCP Server Container App on Failure
        if: failure()
        shell: pwsh
        run: |
          Write-Host "=== MCP Server Container App Detailed Diagnostics ==="

          Write-Host ""
          Write-Host "--- Revision Details ---"
          $revisions = az containerapp revision list `
            --name '${{ inputs.AZURE_MCP_SERVER_CONTAINER_APP_NAME }}' `
            --resource-group '${{ inputs.AZURE_RESOURCE_GROUP }}' `
            --output json | ConvertFrom-Json

          foreach ($rev in $revisions) {
            Write-Host "Revision: $($rev.name) | Active: $($rev.properties.active) | Running: $($rev.properties.runningState) | Health: $($rev.properties.healthState) | Replicas: $($rev.properties.replicas)"

            $replicas = az containerapp replica list `
              --name '${{ inputs.AZURE_MCP_SERVER_CONTAINER_APP_NAME }}' `
              --resource-group '${{ inputs.AZURE_RESOURCE_GROUP }}' `
              --revision "$($rev.name)" `
              --output json 2>&1 | ConvertFrom-Json -ErrorAction SilentlyContinue

            if ($replicas) {
              foreach ($replica in $replicas) {
                Write-Host "  Replica: $($replica.name)"
                foreach ($container in $replica.properties.containers) {
                  Write-Host "    Container: $($container.name) | State: $($container.runningState) | ExitCode: $($container.exitCode) | RestartCount: $($container.restartCount)"
                  if ($container.runningStateDetail) {
                    Write-Host "    State Detail: $($container.runningStateDetail)"
                  }
                }
              }
            }
          }

          Write-Host ""
          Write-Host "--- System Logs (last 100 lines) ---"
          az containerapp logs show `
            --name '${{ inputs.AZURE_MCP_SERVER_CONTAINER_APP_NAME }}' `
            --resource-group '${{ inputs.AZURE_RESOURCE_GROUP }}' `
            --type system `
            --tail 100 2>&1 | Write-Host

          Write-Host ""
          Write-Host "--- Console Logs (last 100 lines) ---"
          az containerapp logs show `
            --name '${{ inputs.AZURE_MCP_SERVER_CONTAINER_APP_NAME }}' `
            --resource-group '${{ inputs.AZURE_RESOURCE_GROUP }}' `
            --type console `
            --tail 100 2>&1 | Write-Host

      - name: Upload Smoke Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-results
          path: TestResults/smoke-tests.xml
          retention-days: 7
