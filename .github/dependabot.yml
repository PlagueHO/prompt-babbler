# yaml-language-server: $schema=https://json.schemastore.org/dependabot-2.0.json
# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for more information:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
# https://containers.dev/guide/dependabot

version: 2
updates:
  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "06:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "github-actions"
      - "ci-cd"
    rebase-strategy: "auto"
    groups:
      actions-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # DevContainer features and configuration
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "06:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "devcontainer"
    rebase-strategy: "auto"
    # Dependabot groups all devcontainer-related dependency updates into one PR.
    groups:
      devcontainer-dependencies:
        patterns:
          - "*"

  # Docker dependencies for containerization
  - package-ecosystem: "docker"
    directory: "/.devcontainer"
    schedule:
      interval: "weekly"
      time: "06:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "docker"
    rebase-strategy: "auto"

  # Docker dependencies for containerization of API service
  - package-ecosystem: "docker"
    directory: "/prompt-babbler-service/src/Api"
    schedule:
      interval: "weekly"
      time: "06:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "docker"
    rebase-strategy: "auto"

  # Docker dependencies for containerization of MCP server
  - package-ecosystem: "docker"
    directory: "/prompt-babbler-service/src/McpServer"
    schedule:
      interval: "weekly"
      time: "06:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "docker"
    rebase-strategy: "auto"

  # .NET SDK and MSBuild SDK versions (global.json)
  - package-ecosystem: "dotnet-sdk"
    directory: "/prompt-babbler-service"
    schedule:
      interval: "weekly"
      time: "06:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "dotnet-sdk"
      - ".net"
    rebase-strategy: "auto"

  # .NET 10+ dependencies (backend services)
  - package-ecosystem: "nuget"
    directory: "/prompt-babbler-service"
    schedule:
      interval: "weekly"
      time: "06:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "nuget"
      - ".net"
    rebase-strategy: "auto"
    groups:
      aspire-packages:
        patterns:
          - "Aspire.*"
        update-types:
          - "minor"
          - "patch"
      microsoft-packages:
        patterns:
          - "Microsoft.*"
        update-types:
          - "minor"
          - "patch"
      opentelemetry:
        patterns:
          - "OpenTelemetry.*"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "Microsoft.AspNetCore.Mvc.Testing"
          - "MSTest.*"
          - "FluentAssertions"
          - "NSubstitute"
          - "coverlet.*"
        update-types:
          - "minor"
          - "patch"
      azure:
        patterns:
          - "Azure.*"
        update-types:
          - "minor"
          - "patch"
    allow:
      - dependency-type: "all"

  # NPM dependencies for repository tooling
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "06:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "npm"
      - "tooling"
    rebase-strategy: "auto"
    allow:
      - dependency-type: "all"

  # NPM dependencies for docs site
  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "weekly"
      time: "06:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "npm"
      - "docs"
    rebase-strategy: "auto"
    allow:
      - dependency-type: "all"

  # NPM dependencies for React app
  - package-ecosystem: "npm"
    directory: "/prompt-babbler-app"
    schedule:
      interval: "weekly"
      time: "06:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "npm"
      - "react"
      - "frontend"
    rebase-strategy: "auto"
    groups:
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - "minor"
          - "patch"
      testing-libraries:
        patterns:
          - "vitest"
          - "@testing-library/*"
          - "@vitest/*"
          - "jsdom"
        update-types:
          - "minor"
          - "patch"
      vite-build:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "@tailwindcss/*"
          - "tailwindcss"
        update-types:
          - "minor"
          - "patch"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "typescript-eslint"
        update-types:
          - "minor"
          - "patch"
      typescript-types:
        patterns:
          - "typescript"
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
      ui-utilities:
        patterns:
          - "date-fns"
          - "clsx"
          - "class-variance-authority"
          - "tailwind-merge"
        update-types:
          - "minor"
          - "patch"
    allow:
      - dependency-type: "all"
    ignore:
      # Ignore major React updates until validated for this app
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  # Azure Bicep modules (infrastructure as code)
  # Note: Dependabot doesn't natively support Bicep registries
  # This is a placeholder for future support or custom tooling
  # For now, use manual checks via update-avm-modules skill
