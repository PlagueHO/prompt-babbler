openapi: 3.1.0
info:
  title: Prompt Babbler API
  description: |
    Backend API for Prompt Babbler. V1 responsibilities:
    1. Proxy LLM calls to Azure OpenAI (CORS workaround)
    2. Real-time speech-to-text via Azure AI Speech Service (WebSocket)
    3. Manage LLM settings (persist to local config file)
    4. Health checks (via Aspire ServiceDefaults)
  version: 1.0.0
  contact:
    name: Prompt Babbler
    url: https://github.com/PlagueHO/prompt-babbler

servers:
  - url: http://localhost:5000
    description: Local development (Aspire-assigned, binds to localhost/127.0.0.1 only)

paths:
  /api/prompts/generate:
    post:
      operationId: generatePrompt
      summary: Generate a structured prompt from babble text
      description: |
        Combines the babble text with the provided system prompt and sends it
        to the configured Azure OpenAI endpoint. Returns the generated prompt
        as a streaming response (Server-Sent Events) or a single JSON response.
      tags:
        - Prompts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratePromptRequest'
            example:
              babbleText: "I need to create a function that takes a list of numbers and returns the sum but also handles edge cases like empty lists and non-numeric values and it should be in Python and well tested"
              systemPrompt: "You are a prompt engineering assistant. Transform the following stream-of-consciousness text into a well-structured prompt for GitHub Copilot Chat. The prompt should include clear context, a specific task description, and any constraints mentioned."
      responses:
        '200':
          description: Generated prompt (streaming or complete)
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Server-Sent Events stream. Each event contains a `data` field
                  with a JSON object: `{"text": "chunk of generated text"}`.
                  The stream ends with `data: [DONE]`.
              example: |
                data: {"text":"Create a Python function"}
                data: {"text":" called `sum_numbers`"}
                data: {"text":" that accepts a list"}
                data: [DONE]
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratePromptResponse'
        '400':
          description: Invalid request (missing fields, empty text)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          description: LLM settings not configured
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: "https://promptbabbler.dev/errors/settings-not-configured"
                title: "LLM Settings Not Configured"
                status: 422
                detail: "Azure OpenAI settings must be configured before generating prompts. Please configure your endpoint, API key, and deployment name in Settings."
        '502':
          description: Azure OpenAI endpoint error (invalid credentials, rate limiting, service unavailable)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /api/transcribe/stream:
    get:
      operationId: streamTranscription
      summary: Real-time audio transcription via WebSocket
      description: |
        Opens a WebSocket connection for real-time speech-to-text transcription
        using Azure AI Speech Service. The client sends raw PCM audio frames
        (16 kHz, 16-bit, mono) as binary WebSocket messages. The server
        responds with JSON text messages containing partial and final
        transcription results.

        Protocol:
        1. Client opens WebSocket to this URL (with optional `?language=en-US`)
        2. Client sends binary frames of raw PCM audio data
        3. Server sends JSON text frames: `{"text":"...", "isFinal": true|false}`
        4. Client closes WebSocket when recording stops
      tags:
        - Transcription
      parameters:
        - name: language
          in: query
          required: false
          schema:
            type: string
          description: |
            BCP-47 language code (e.g., "en-US", "es-ES"). If omitted,
            defaults to "en-US". Used to configure the Speech Recognizer.
      responses:
        '101':
          description: WebSocket upgrade — real-time transcription session begins
        '400':
          description: Not a WebSocket request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /api/settings:
    get:
      operationId: getSettings
      summary: Get current LLM settings
      description: |
        Returns the current LLM configuration. The API key is masked —
        only the last 4 characters are returned as `apiKeyHint`.
      tags:
        - Settings
      responses:
        '200':
          description: Current LLM settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmSettingsResponse'
              examples:
                configured:
                  summary: Settings are configured
                  value:
                    endpoint: "https://my-resource.openai.azure.com/"
                    apiKeyHint: "...a1b2"
                    deploymentName: "gpt-4o-mini"
                    sttDeploymentName: "gpt-4o-transcribe"
                    isConfigured: true
                notConfigured:
                  summary: Settings not yet configured
                  value:
                    endpoint: ""
                    apiKeyHint: ""
                    deploymentName: ""
                    sttDeploymentName: ""
                    isConfigured: false

    put:
      operationId: updateSettings
      summary: Save LLM settings
      description: |
        Saves the LLM configuration to the backend config file
        (`~/.prompt-babbler/settings.json`). Validates the endpoint format
        and that all required fields are present.
      tags:
        - Settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LlmSettingsSaveRequest'
            example:
              endpoint: "https://my-resource.openai.azure.com/"
              apiKey: "sk-abc123def456..."
              deploymentName: "gpt-4o-mini"
              sttDeploymentName: "gpt-4o-transcribe"
      responses:
        '200':
          description: Settings saved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmSettingsResponse'
        '400':
          description: Invalid settings (bad URL format, missing fields)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /api/settings/test:
    post:
      operationId: testConnection
      summary: Test LLM connection
      description: |
        Sends a lightweight request to the configured Azure OpenAI endpoint
        to verify that the endpoint is reachable and the credentials are valid.
        Uses the currently saved settings (not request body).
      tags:
        - Settings
      responses:
        '200':
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestConnectionResponse'
              examples:
                success:
                  summary: Connection successful
                  value:
                    success: true
                    message: "Successfully connected to Azure OpenAI endpoint."
                    latencyMs: 234
                failure:
                  summary: Connection failed
                  value:
                    success: false
                    message: "Authentication failed. Please verify your API key."
                    latencyMs: null
        '422':
          description: Settings not configured
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /health:
    get:
      operationId: healthCheck
      summary: Health check
      description: Aspire default health endpoint. Returns healthy if the service is running.
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy
          content:
            text/plain:
              schema:
                type: string
              example: "Healthy"

  /alive:
    get:
      operationId: livenessCheck
      summary: Liveness check
      description: Aspire default liveness endpoint. Returns healthy if the service is responsive.
      tags:
        - Health
      responses:
        '200':
          description: Service is alive
          content:
            text/plain:
              schema:
                type: string
              example: "Healthy"

components:
  schemas:
    GeneratePromptRequest:
      type: object
      required:
        - babbleText
        - systemPrompt
      properties:
        babbleText:
          type: string
          minLength: 1
          maxLength: 500000
          description: The raw babble transcription text to transform into a prompt.
        systemPrompt:
          type: string
          minLength: 1
          maxLength: 10000
          description: The system prompt from the selected template that instructs the LLM how to format the output.

    GeneratePromptResponse:
      type: object
      required:
        - promptText
      properties:
        promptText:
          type: string
          description: The complete generated prompt text.

    LlmSettingsResponse:
      type: object
      required:
        - endpoint
        - apiKeyHint
        - deploymentName
        - sttDeploymentName
        - isConfigured
      properties:
        endpoint:
          type: string
          format: uri
          description: Azure OpenAI endpoint URL.
        apiKeyHint:
          type: string
          description: Masked API key showing only the last 4 characters (e.g., "...a1b2"). Empty if not configured.
        deploymentName:
          type: string
          description: Model deployment name for LLM/prompt generation.
        sttDeploymentName:
          type: string
          description: Model deployment name for speech-to-text (e.g., gpt-4o-transcribe).
        isConfigured:
          type: boolean
          description: Whether all required settings have been provided.

    LlmSettingsSaveRequest:
      type: object
      required:
        - endpoint
        - apiKey
        - deploymentName
        - sttDeploymentName
      properties:
        endpoint:
          type: string
          format: uri
          description: Azure OpenAI or Azure AI Foundry endpoint URL (must be HTTPS).
        apiKey:
          type: string
          minLength: 1
          description: API key for Azure OpenAI authentication.
        deploymentName:
          type: string
          minLength: 1
          maxLength: 64
          description: The deployment name of the LLM model to use for prompt generation.
        sttDeploymentName:
          type: string
          minLength: 1
          maxLength: 64
          description: The deployment name of the STT model to use for speech-to-text (e.g., gpt-4o-transcribe).

    TestConnectionResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
          description: Whether the connection test succeeded.
        message:
          type: string
          description: Human-readable result message.
        latencyMs:
          type: integer
          nullable: true
          description: Round-trip latency in milliseconds (null if connection failed).

    ProblemDetails:
      type: object
      description: RFC 9457 Problem Details response.
      properties:
        type:
          type: string
          format: uri
          description: URI identifying the problem type.
        title:
          type: string
          description: Short human-readable summary.
        status:
          type: integer
          description: HTTP status code.
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence.
        instance:
          type: string
          format: uri
          description: URI identifying the specific occurrence.

    TranscriptionMessage:
      type: object
      description: A single transcription event received over the WebSocket.
      required:
        - text
        - isFinal
      properties:
        text:
          type: string
          description: The recognized text (partial or final).
        isFinal:
          type: boolean
          description: |
            True when this is a finalized recognition result.
            False for interim/partial results that may change.
          description: Duration of the audio in seconds.

tags:
  - name: Prompts
    description: Prompt generation endpoints
  - name: Transcription
    description: Speech-to-text transcription via Azure OpenAI
  - name: Settings
    description: LLM and STT configuration management
  - name: Health
    description: Health and liveness checks (Aspire ServiceDefaults)
